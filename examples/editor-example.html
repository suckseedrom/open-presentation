<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Presentation Studio — zero-dependency editor demo</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="../lib/player.css">
  <link rel="stylesheet" href="../lib/editor.css">
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #070b12; }
    #player { width: 100vw; height: 100vh; }
    .demo-scene { position: relative; width: 100%; height: 100%; overflow: hidden; color: #f7f8fb; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
    .demo-layer { position: absolute; left: calc(var(--x) * 100%); top: calc(var(--y) * 100%); width: calc(var(--w) * 100%); height: calc(var(--h) * 100%); opacity: 0; transform: translateY(20px) scale(.98); transition: opacity .5s ease, transform .7s cubic-bezier(.16, 1, .3, 1); }
    .demo-scene.is-active .demo-layer { opacity: var(--opacity, 1); transform: translateY(0) scale(1); }
    .demo-text { display: flex; align-items: center; color: var(--color, #fff); font-size: var(--size, 64px); font-weight: var(--weight, 700); letter-spacing: -.045em; line-height: .95; text-align: var(--align, left); }
    .demo-surface { display: grid; place-items: center; overflow: hidden; border: 1px solid rgba(255,255,255,.14); border-radius: 30px; background: linear-gradient(145deg, rgba(255,255,255,.13), rgba(255,255,255,.04)); box-shadow: 0 30px 100px rgba(0,0,0,.35); color: rgba(255,255,255,.78); font-size: 18px; font-weight: 650; }
    .demo-shape { border-radius: 999px; background: var(--fill, #79f2c0); filter: blur(.2px); }
    .demo-kicker { position: absolute; left: 5%; top: 5%; color: rgba(255,255,255,.58); font: 650 14px/1 ui-sans-serif, system-ui; letter-spacing: .16em; text-transform: uppercase; }
    @media (max-width: 767px) {
      .demo-layer { left: calc(var(--mx) * 100%); top: calc(var(--my) * 100%); width: calc(var(--mw) * 100%); height: calc(var(--mh) * 100%); }
      .demo-text { font-size: min(var(--size, 64px), 54px); }
      .demo-kicker { left: 7%; top: 4%; }
    }
    @media (prefers-reduced-motion: reduce) { .demo-layer { transition-duration: .12s; transform: none; } }
  </style>
</head>
<body>
  <main id="player" aria-label="Editable presentation player"></main>
  <div id="editor-root"></div>

  <script src="../lib/player.js"></script>
  <script src="../lib/editor-model.js"></script>
  <script src="../lib/editor-renderer.js"></script>
  <script src="../lib/editor-export.js"></script>
  <script src="../lib/editor.js"></script>
  <script>
    (() => {
      const STORAGE_KEY = 'pf-editor-demo:v1';
      const geometry = (x, y, width, height) => ({ x, y, width, height, rotation: 0 });
      const timing = durationMs => ({ startMs: 0, endMs: durationMs, enterMs: 180, exitMs: 180, easing: 'ease-out' });
      const baseLayer = (id, type, z, desktop, portrait, durationMs) => ({
        id, type, name: id.replaceAll('-', ' '), visible: true, locked: false, z,
        geometry: desktop, layouts: { '16:9': desktop, '9:16': portrait }, timing: timing(durationMs)
      });
      const seed = {
        schemaVersion: 1, id: 'studio-demo', title: 'Signal Studio', aspect: '16:9', fps: 30,
        scenes: [
          {
            id: 'scene-signal', name: 'Signal', durationMs: 1200, background: '#07111d',
            layers: [
              { ...baseLayer('signal-glow', 'shape', 0, geometry(.08,.16,.16,.05), geometry(.08,.12,.30,.035), 1200), shape: 'rounded-rect', style: { fill: '#79f2c0', stroke: '#79f2c0', strokeWidth: 0, radius: 80, opacity: .9 } },
              { ...baseLayer('signal-title', 'text', 1, geometry(.08,.32,.62,.28), geometry(.08,.27,.84,.22), 1200), text: 'Make the signal impossible to miss.', style: { color: '#f7f8fb', fontSize: 88, fontWeight: 800, fontFamily: 'sans-serif', align: 'left', opacity: 1 } },
              { ...baseLayer('signal-panel', 'product-surface', 2, geometry(.72,.19,.22,.62), geometry(.08,.58,.84,.25), 1200), surface: { kind: 'mobile', label: 'Live campaign pulse', accent: '#79f2c0' }, style: { fill: '#142436', radius: 30, opacity: 1 } }
            ]
          },
          {
            id: 'scene-system', name: 'System', durationMs: 1200, background: '#171126',
            layers: [
              { ...baseLayer('system-frame', 'product-surface', 0, geometry(.07,.16,.58,.68), geometry(.07,.12,.86,.48), 1200), surface: { kind: 'dashboard', label: 'Creative system · 18 live layers', accent: '#a78bfa' }, style: { fill: '#271d42', radius: 28, opacity: 1 } },
              { ...baseLayer('system-title', 'text', 1, geometry(.69,.29,.25,.22), geometry(.09,.66,.82,.15), 1200), text: 'Every layer stays editable.', style: { color: '#ffffff', fontSize: 66, fontWeight: 750, fontFamily: 'sans-serif', align: 'left', opacity: 1 } },
              { ...baseLayer('system-dot', 'shape', 2, geometry(.69,.59,.08,.025), geometry(.09,.85,.18,.018), 1200), shape: 'rounded-rect', style: { fill: '#a78bfa', stroke: '#a78bfa', strokeWidth: 0, radius: 80, opacity: 1 } }
            ]
          },
          {
            id: 'scene-deliver', name: 'Deliver', durationMs: 1100, background: '#081713',
            layers: [
              { ...baseLayer('deliver-title', 'text', 0, geometry(.14,.27,.72,.20), geometry(.08,.28,.84,.18), 1100), text: 'Edit. Preview. Export 4K.', style: { color: '#ecfff7', fontSize: 92, fontWeight: 800, fontFamily: 'sans-serif', align: 'center', opacity: 1 } },
              { ...baseLayer('deliver-card', 'product-surface', 1, geometry(.28,.57,.44,.19), geometry(.13,.58,.74,.18), 1100), surface: { kind: 'card', label: '16:9 landscape · 9:16 portrait', accent: '#2dd4bf' }, style: { fill: '#12372e', radius: 26, opacity: 1 } }
            ]
          }
        ]
      };

      const escapeHtml = value => String(value ?? '').replace(/[&<>"']/g, char => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' })[char]);
      const layerMarkup = layer => {
        if (!layer.visible || layer.type === 'group') return '';
        const d = layer.layouts['16:9'];
        const m = layer.layouts['9:16'];
        const variables = `--x:${d.x};--y:${d.y};--w:${d.width};--h:${d.height};--mx:${m.x};--my:${m.y};--mw:${m.width};--mh:${m.height};--opacity:${layer.style.opacity ?? 1}`;
        if (layer.type === 'text') return `<div class="demo-layer demo-text" style="${variables};--color:${escapeHtml(layer.style.color)};--size:${Number(layer.style.fontSize)}px;--weight:${Number(layer.style.fontWeight)};--align:${escapeHtml(layer.style.align)}">${escapeHtml(layer.text)}</div>`;
        if (layer.type === 'shape') return `<div class="demo-layer demo-shape" style="${variables};--fill:${escapeHtml(layer.style.fill)}"></div>`;
        return `<div class="demo-layer demo-surface" style="${variables}">${escapeHtml(layer.surface?.label || layer.name)}</div>`;
      };
      const playerScenes = composition => composition.scenes.map(scene => ({
        id: scene.id, duration: scene.durationMs, background: scene.background,
        html: `<section class="demo-scene"><span class="demo-kicker">Signal Studio</span>${scene.layers.slice().sort((a,b) => a.z - b.z).map(layerMarkup).join('')}</section>`,
        activate: node => {
          const activeScene = node.querySelector('.demo-scene');
          activeScene.classList.remove('is-active');
          void activeScene.offsetWidth;
          activeScene.classList.add('is-active');
        }
      }));

      const storage = PresentationEditorModel.createAutosave({ storage: localStorage, key: STORAGE_KEY, delayMs: 250 });
      let composition;
      try { composition = storage.restore() || PresentationEditorModel.createComposition(seed); }
      catch (error) { console.warn('Saved composition could not be restored:', error); composition = PresentationEditorModel.createComposition(seed); }
      let player;
      let editor;

      function mountPlayer() {
        if (player) player.destroy();
        player = new PresentationPlayer(document.getElementById('player'), {
          scenes: playerScenes(composition),
          onEdit: () => {
            player.pause();
            if (editor) return;
            editor = new PresentationEditor(document.getElementById('editor-root'), {
              composition, autosave: storage, autosaveKey: STORAGE_KEY,
              onClose: nextComposition => {
                composition = nextComposition;
                editor = null;
                mountPlayer();
              }
            });
          }
        });
      }
      mountPlayer();
    })();
  </script>
</body>
</html>
